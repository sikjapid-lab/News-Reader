<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه پیشرفته جهان‌نما AI | پایش زنده و آرشیو جامع اخبار</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb', darkbg: '#0f172a', carddark: '#1e293b' } } }
        }
    </script>
    <style>
        #mapContainer { position: relative; }
        #map { height: 480px; width: 100%; border-radius: 1rem; z-index: 10; }
        .map-fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; border-radius: 0 !important; }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; }
        /* کندتر شدن سرعت نمایش اخبار فوری به ۸۵ ثانیه */
        .ticker-move { display: inline-block; animation: ticker 85s linear infinite; }
        .ticker-move:hover { animation-play-state: paused; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-darkbg dark:text-slate-100 transition-colors duration-200 min-h-screen">

    <!-- نوار اخبار فوری اصلاح شده -->
    <div class="bg-red-700 text-white text-xs py-2 px-4 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-2 font-bold shrink-0 bg-red-900 px-2 py-0.5 rounded">
            <i class="fa-solid fa-bolt animate-pulse text-amber-300"></i> اخبار فوری جهان
        </div>
        <div class="ticker-wrap mx-4">
            <div id="breakingTicker" class="ticker-move text-xs font-semibold">در حال دریافت جدیدترین اخبار...</div>
        </div>
        <div class="text-[10px] opacity-80 shrink-0 hidden md:block" id="liveClock"></div>
    </div>

    <!-- هدر سایت -->
    <header class="sticky top-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur border-b border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-blue-600 text-white rounded-xl shadow-md">
                    <i class="fa-solid fa-earth-americas text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                        سامانه جهان‌نما AI
                    </h1>
                    <p class="text-xs text-slate-500">پایش هوشمند و خودکار اخبار هوشمند بین‌المللی</p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <div class="bg-slate-200 dark:bg-slate-800 p-1 rounded-xl flex gap-1">
                    <button id="btnViewLive" onclick="switchView('live')" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-white dark:bg-slate-700 text-blue-600 shadow">پایش زنده</button>
                    <button id="btnViewArchive" onclick="switchView('archive')" class="px-3 py-1.5 rounded-lg text-xs font-bold text-slate-600 dark:text-slate-300 hover:text-blue-600">آرشیو کامل دیتابیس</button>
                </div>

                <button onclick="forceRefreshData()" class="p-2.5 rounded-xl bg-blue-600 text-white hover:bg-blue-700 font-bold text-xs flex items-center gap-1 shadow-sm">
                    <i class="fa-solid fa-rotate" id="refreshSpinner"></i>
                </button>

                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:inline text-amber-400"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

        <!-- داشبورد آمار -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white dark:bg-carddark p-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center gap-3">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-xl"><i class="fa-solid fa-database text-lg"></i></div>
                <div><p class="text-[11px] text-slate-500">کل اخبار دیتابیس</p><h4 id="statTotalNews" class="text-base font-black">0</h4></div>
            </div>
            <div class="bg-white dark:bg-carddark p-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center gap-3">
                <div class="p-3 bg-emerald-100 text-emerald-600 rounded-xl"><i class="fa-solid fa-filter text-lg"></i></div>
                <div><p class="text-[11px] text-slate-500">نتایج نتایج جستجو</p><h4 id="statFilteredNews" class="text-base font-black">0</h4></div>
            </div>
            <div class="bg-white dark:bg-carddark p-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center gap-3">
                <div class="p-3 bg-purple-100 text-purple-600 rounded-xl"><i class="fa-solid fa-rss text-lg"></i></div>
                <div><p class="text-[11px] text-slate-500">منابع خبری فعال</p><h4 id="statSources" class="text-base font-black">0</h4></div>
            </div>
            <div class="bg-white dark:bg-carddark p-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center gap-3">
                <div class="p-3 bg-rose-100 text-rose-600 rounded-xl"><i class="fa-solid fa-clock text-lg"></i></div>
                <div><p class="text-[11px] text-slate-500">آخرین بروزرسانی</p><h4 id="statLastUpdate" class="text-xs font-bold truncate">در حال بررسی...</h4></div>
            </div>
        </section>

        <!-- نقشه GIS -->
        <section id="mapContainer" class="bg-white dark:bg-carddark p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span class="p-2 bg-blue-100 dark:bg-blue-900/40 text-blue-600 rounded-lg"><i class="fa-solid fa-map-location-dot"></i></span>
                    <h2 class="text-sm font-bold">نقشه GIS پراکندگی جغرافیایی اخبار</h2>
                </div>
                <button onclick="toggleMapFullscreen()" class="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-slate-700 dark:text-slate-200 rounded-xl text-xs font-bold flex items-center gap-1.5">
                    <i class="fa-solid fa-expand" id="fullscreenIcon"></i> <span id="fullscreenText">تمام صفحه</span>
                </button>
            </div>
            <div id="map"></div>
        </section>

        <!-- موتور فیلتر و خروجی -->
        <section class="bg-white dark:bg-carddark p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <div class="relative md:col-span-2">
                    <input type="text" id="searchInput" oninput="filterNews()" placeholder="جستجو در کل اخبار آرشیو..." class="w-full pl-8 pr-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-xs focus:outline-none">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-xs"></i>
                </div>
                
                <select id="sourceFilter" onchange="filterNews()" class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-xs">
                    <option value="all">همه خبرگزاری‌ها (منبع)</option>
                </select>

                <select id="categoryFilter" onchange="filterNews()" class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-xs">
                    <option value="all">همه موضوعات</option>
                    <option value="سیاست">سیاست</option>
                    <option value="فناوری و AI">فناوری و AI</option>
                    <option value="اقتصاد و بازار">اقتصاد و بازار</option>
                </select>
            </div>

            <div class="flex items-center justify-between pt-3 border-t border-slate-100 dark:border-slate-800">
                <button onclick="exportStructuredBulletin('pdf')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> خروجی بولتن (PDF)
                </button>
            </div>
        </section>

        <!-- شبکه کارت‌های اخبار -->
        <section><div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></section>
    </main>

    <!-- مدال جزییات خبر - کاملاً اصلاح و تست شده -->
    <div id="newsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-carddark w-full max-w-2xl rounded-2xl max-h-[90vh] overflow-y-auto p-6 relative shadow-2xl space-y-4">
            <button onclick="closeNewsModal()" class="absolute top-4 left-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let allArticles = [];
        let filteredArticles = [];
        let currentView = 'live'; 
        let map, clusterGroup;

        document.addEventListener("DOMContentLoaded", () => {
            initClock();
            initMap();
            forceRefreshData();
        });

        function initClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('liveClock').innerText = now.toLocaleTimeString('fa-IR');
            }, 1000);
        }

        function initMap() {
            const googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });
            map = L.map('map', { center: [20, 0], zoom: 2, layers: [googleStreets] });
            clusterGroup = L.markerClusterGroup();
            map.addLayer(clusterGroup);
        }

        async function forceRefreshData() {
            try {
                const response = await fetch('./news_data.json?nocache=' + new Date().getTime());
                const data = await response.json();
                
                allArticles = data.articles || [];
                
                document.getElementById('statTotalNews').innerText = allArticles.length;
                document.getElementById('statLastUpdate').innerText = data.last_update || 'هم‌اکنون';
                
                populateSourceFilter();
                filterNews();
                updateBreakingTicker();
            } catch (err) {
                console.error("خطا در بارگذاری دیتابیس اخبار:", err);
            }
        }

        function populateSourceFilter() {
            const sources = [...new Set(allArticles.map(a => a.source || 'نامشخص'))];
            document.getElementById('statSources').innerText = sources.length;
            const sourceSelect = document.getElementById('sourceFilter');
            sourceSelect.innerHTML = '<option value="all">همه خبرگزاری‌ها (منبع)</option>';
            sources.forEach(src => {
                sourceSelect.innerHTML += `<option value="${src}">${src}</option>`;
            });
        }

        function updateBreakingTicker() {
            const breaking = allArticles.slice(0, 15);
            if (breaking.length > 0) {
                // ارجاع مستقیم به اصل خبر با کلیک روی هر لید خبر فوری
                const tickerText = breaking.map(a => `<a href="${a.link}" target="_blank" class="hover:underline hover:text-amber-300 transition">🌐 [${a.source}] ${a.title_fa || a.title}</a>`).join(' &nbsp;&nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp;&nbsp; ');
                document.getElementById('breakingTicker').innerHTML = tickerText;
            }
        }

        function renderNewsGrid(articles) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '';

            articles.forEach(art => {
                const titleText = art.title_fa || art.title || 'بدون عنوان';
                const summaryText = art.summary_fa || art.summary || 'بدون خلاصه';
                const imgSrc = art.image || "https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80";

                const card = document.createElement('div');
                card.className = "bg-white dark:bg-carddark rounded-2xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <img src="${imgSrc}" class="w-full h-44 object-cover">
                        <div class="p-4 space-y-2">
                            <span class="text-[10px] bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded">${art.source}</span>
                            <h3 class="font-bold text-sm line-clamp-2">${titleText}</h3>
                            <p class="text-xs text-slate-500 line-clamp-3">${summaryText}</p>
                        </div>
                    </div>
                    <div class="p-4 pt-0 flex gap-2">
                        <button onclick="openNewsModal('${art.id}')" class="w-full bg-blue-600 text-white py-2 rounded-xl text-xs font-bold hover:bg-blue-700">مطالعه کامل خبر</button>
                        <a href="${art.link}" target="_blank" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs text-slate-500 flex items-center justify-center hover:text-blue-600"><i class="fa-solid fa-external-link"></i></a>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('statFilteredNews').innerText = articles.length;
        }

        function filterNews() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const source = document.getElementById('sourceFilter').value;
            const category = document.getElementById('categoryFilter').value;

            filteredArticles = allArticles.filter(art => {
                const title = (art.title_fa || art.title || '').toLowerCase();
                const matchesQuery = title.includes(query);
                const matchesSource = source === 'all' || art.source === source;
                const matchesCategory = category === 'all' || art.category === category;
                return matchesQuery && matchesSource && matchesCategory;
            });

            renderNewsGrid(filteredArticles);
        }

        /* تابع باز کردن مدال جزییات خبر با فراخوانی شناسه MD5 یکتا */
        function openNewsModal(id) {
            const art = allArticles.find(a => String(a.id) === String(id));
            if (!art) return;

            const imgSrc = art.image || "https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80";

            document.getElementById('modalContent').innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-xs bg-blue-100 text-blue-800 px-2.5 py-1 rounded-full font-bold">${art.source}</span>
                </div>
                <h2 class="text-base font-bold text-slate-900 dark:text-white leading-snug">${art.title_fa || art.title}</h2>
                <img src="${imgSrc}" class="w-full h-60 object-cover rounded-xl my-3 shadow">
                <p class="text-xs text-slate-600 dark:text-slate-300 leading-relaxed my-3">${art.summary_fa || art.summary}</p>
                <div class="flex items-center justify-between pt-2 border-t dark:border-slate-700">
                    <a href="${art.link}" target="_blank" class="text-xs text-blue-600 font-bold inline-flex items-center gap-1">مشاهده منبع اصلی خبر <i class="fa-solid fa-arrow-left"></i></a>
                </div>
            `;
            document.getElementById('newsModal').classList.remove('hidden');
        }

        function closeNewsModal() { document.getElementById('newsModal').classList.add('hidden'); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        function switchView(view) { currentView = view; filterNews(); }
    </script>
</body>
</html>
