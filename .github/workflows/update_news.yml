name: Auto News AI Ingestion & Deployment

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from button or API

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install feedparser requests beautifulsoup4 deep-translator

      - name: Fetch & Translate News with HF AI
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          python process_news.py

      - name: Commit and Push Updated News JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json
          git commit -m "Auto update AI news data [skip ci]" || exit 0
          git push
