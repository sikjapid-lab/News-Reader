name: Auto Process News Feed

on:
  schedule:
    # اجرای خودکار هر ۳۰ دقیقه یک‌بار
    - cron: '*/3 * * * *'
  workflow_dispatch: # امکان اجرای دستی از داخل گیت‌هاب

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 deep-translator

      - name: Run News Processor Script
        run: python process_news.py

      - name: Commit and Push Updated News Data
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add news_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news archive data [skip ci]" && git push)
